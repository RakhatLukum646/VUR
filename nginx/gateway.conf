upstream frontend {
    server frontend:80;
}

upstream mediapipe {
    server media-pipe:8001;
}

upstream llm {
    server llm-service:8002;
}

upstream auth {
    server auth-service:8003;
}

server {
    listen 80;
    server_name localhost;

    # ── Auth Service ──────────────────────────────────────────
    location /auth/ {
        proxy_pass http://auth/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── LLM (translation) REST API ────────────────────────────
    location /api/v1/ {
        proxy_pass http://llm/api/v1/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── MediaPipe WebSocket endpoint ─────────────────────────
    location /ws/ {
        proxy_pass http://mediapipe/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health checks ────────────────────────────────────────
    location /health {
        proxy_pass http://llm/health;
        proxy_set_header Host $host;
    }

    location /health/mediapipe {
        proxy_pass http://mediapipe/api/v1/health;
        proxy_set_header Host $host;
    }

    # ── Frontend SPA (catch-all) ─────────────────────────────
    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
