services:
  # ── API Gateway (Nginx) — single public entry point ───────
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - media-pipe
      - llm-service
      - auth-service
    restart: unless-stopped

  # ── Frontend (React + Nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Not exposed directly — accessed via gateway
    expose:
      - "80"
    depends_on:
      - media-pipe
      - llm-service
    restart: unless-stopped

  # ── MediaPipe Service ─────────────────────────────────────
  media-pipe:
    build:
      context: ./backend/media_pipe_service
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      - PORT=8001
      - CONFIDENCE_THRESHOLD=0.7
      - LLM_SERVICE_URL=http://llm-service:8002
    depends_on:
      - llm-service
    restart: unless-stopped

  # ── LLM Service (Gemini) ──────────────────────────────────
  llm-service:
    build:
      context: ./backend/llm_service
      dockerfile: Dockerfile
    expose:
      - "8002"
    env_file:
      - .env
    environment:
      - PORT=8002
      - GEMINI_MODEL=gemini-2.5-flash
      - LOG_LEVEL=info
    restart: unless-stopped

  # ── Auth Service ──────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth_service
      dockerfile: Dockerfile
    expose:
      - "8003"
    env_file:
      - .env
    environment:
      - frontend_url=http://localhost
    restart: unless-stopped
