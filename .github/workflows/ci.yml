name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test -- --run

  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth_service
          - llm_service
          - media_pipe_service
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: python -m venv venv

      - run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - run: |
          source venv/bin/activate
          pip install pytest-cov
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=70

      - if: matrix.service == 'auth_service'
        run: |
          source venv/bin/activate
          python -m compileall app

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build media-pipe image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/media_pipe_service
          file: ./backend/media_pipe_service/Dockerfile
          push: false
          tags: vur/media-pipe:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build llm-service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/llm_service
          file: ./backend/llm_service/Dockerfile
          push: false
          tags: vur/llm-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth_service
          file: ./backend/auth_service/Dockerfile
          push: false
          tags: vur/auth-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: vur/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
